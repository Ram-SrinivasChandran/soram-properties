<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340" width="200" height="340" role="img" aria-label="Sornam Properties and Developers logo - Vel Ayudham of Murugan">

  <!-- ===== BLADE ===== -->
  <path d="M100 14
           C 140 56, 152 92, 130 120
           C 122 130, 112 136, 100 132
           C 88 136, 78 130, 70 120
           C 48 92, 60 56, 100 14 Z"
        fill="#F2B600" stroke="#111111" stroke-width="5" stroke-linejoin="round"/>
  <path d="M100 14
           C 60 56, 48 92, 70 120
           C 78 130, 88 136, 100 132 Z"
        fill="#FFD400"/>
  <line x1="100" y1="20" x2="100" y2="131" stroke="#111111" stroke-width="2.5"/>

  <!-- Tripundra (three sacred ash stripes) + bindu -->
  <rect x="62" y="58" width="76" height="11" rx="5.5" fill="#FFFFFF" stroke="#111111" stroke-width="2.5"/>
  <rect x="62" y="71" width="76" height="11" rx="5.5" fill="#FFFFFF" stroke="#111111" stroke-width="2.5"/>
  <rect x="62" y="84" width="76" height="11" rx="5.5" fill="#FFFFFF" stroke="#111111" stroke-width="2.5"/>
  <circle cx="100" cy="84.5" r="9" fill="#E63B2E" stroke="#111111" stroke-width="2.5"/>

  <!-- ===== LOTUS COLLAR ===== -->
  <g fill="#FFD400" stroke="#111111" stroke-width="3.5" stroke-linejoin="round">
    <path d="M100 132 C 90 142, 88 154, 100 162 C 112 154, 110 142, 100 132 Z"/>
    <path d="M100 132 C 90 142, 88 154, 100 162 C 112 154, 110 142, 100 132 Z" transform="rotate(38 100 140)"/>
    <path d="M100 132 C 90 142, 88 154, 100 162 C 112 154, 110 142, 100 132 Z" transform="rotate(-38 100 140)"/>
    <path d="M100 132 C 92 140, 90 150, 100 156 C 110 150, 108 140, 100 132 Z" transform="rotate(70 100 138)"/>
    <path d="M100 132 C 92 140, 90 150, 100 156 C 110 150, 108 140, 100 132 Z" transform="rotate(-70 100 138)"/>
  </g>

  <!-- ===== NECK ===== -->
  <rect x="86" y="158" width="28" height="22" rx="5" fill="#FFD400" stroke="#111111" stroke-width="4"/>

  <!-- ===== RIBBON BOW ===== -->
  <g stroke="#111111" stroke-width="3.5" stroke-linejoin="round">
    <path d="M100 172 C 78 164, 58 168, 52 182 C 58 196, 80 196, 100 184 Z" fill="#F5821F"/>
    <path d="M100 172 C 78 164, 58 168, 52 182 C 58 196, 80 196, 100 184 Z" fill="#F5821F" transform="scale(-1,1) translate(-200,0)"/>
    <circle cx="100" cy="178" r="9" fill="#D9690A"/>
    <path d="M105 184 C 118 198, 132 212, 122 230 C 110 222, 108 206, 100 188 Z" fill="#F5821F"/>
    <path d="M122 230 L132 222 L128 238 L138 232 L130 248 Z" fill="#F5821F"/>
  </g>

  <!-- ===== SHAFT ===== -->
  <rect x="92" y="182" width="16" height="118" fill="#F2B600" stroke="#111111" stroke-width="5" stroke-linejoin="round"/>
  <rect x="92" y="182" width="8" height="118" fill="#FFD400"/>

  <!-- ===== BOTTOM TIP ===== -->
  <g fill="#FFD400" stroke="#111111" stroke-width="4" stroke-linejoin="round">
    <path d="M100 300 C 92 306, 88 314, 100 332 C 112 314, 108 306, 100 300 Z"/>
    <circle cx="80" cy="306" r="8"/>
    <circle cx="120" cy="306" r="8"/>
  </g>
</svg>
